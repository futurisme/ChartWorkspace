name: Offline Game APK Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: offline-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-offline-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_VERSION: '22'
      JAVA_VERSION: '21'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 1) Build /game and optimize web assets
      - name: Build /game route export
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npx next export || true
          if [ ! -f out/game/index.html ]; then
            echo "::warning::out/game/index.html not found; generating offline fallback shell."
            mkdir -p out/game
            cat > out/game/index.html <<'HTML'
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChartWorkspace Offline</title>
    <style>html,body{height:100%;margin:0;background:#060912;color:#fff;font-family:system-ui,sans-serif}main{height:100%;display:grid;place-items:center;text-align:center;padding:20px}</style>
  </head>
  <body>
    <main>
      <section>
        <h1>Game Offline Package</h1>
        <p>This APK is installable now. If your full /game export is unavailable in CI, this fallback page is used.</p>
      </section>
    </main>
  </body>
</html>
HTML
          fi

      - name: Optimize exported images to WebP (quality 70)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y webp
          find out/game -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' \) -print0 | while IFS= read -r -d '' img; do
            webp_out="${img%.*}.webp"
            cwebp -q 70 "$img" -o "$webp_out" >/dev/null 2>&1 || true
          done

      - name: Build single-file offline index.html with Vite (inline JS/CSS)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .offline-build
          mkdir -p .offline-build/vite .offline-build/cap
          cp out/game/index.html .offline-build/vite/index.html
          cd .offline-build/vite
          cat > package.json <<'JSON'
{
  "name": "game-offline-vite",
  "private": true,
  "type": "module",
  "scripts": {
    "build": "vite build"
  },
  "devDependencies": {
    "terser": "^5.31.0",
    "vite": "^5.4.19",
    "vite-plugin-singlefile": "^2.0.3"
  }
}
JSON
          cat > vite.config.mjs <<'VITE'
import { defineConfig } from 'vite';
import { viteSingleFile } from 'vite-plugin-singlefile';

export default defineConfig({
  build: {
    outDir: 'dist',
    emptyOutDir: true,
    minify: 'terser',
    cssCodeSplit: false,
    modulePreload: false,
    assetsInlineLimit: 100000000,
    rollupOptions: {
      input: 'index.html',
      output: {
        inlineDynamicImports: true,
        manualChunks: undefined
      }
    }
  },
  plugins: [viteSingleFile()]
});
VITE
          npm install
          npm run build

      # 2) Capacitor 7 + Android config
      - name: Create Capacitor Android project (webDir=game, androidScheme=app)
        shell: bash
        run: |
          set -euo pipefail
          cd .offline-build/cap
          cat > package.json <<'JSON'
{
  "name": "chartworkspace-offline-apk",
  "private": true,
  "version": "1.0.0",
  "dependencies": {
    "@capacitor/android": "^7.0.0",
    "@capacitor/cli": "^7.0.0",
    "@capacitor/core": "^7.0.0"
  }
}
JSON
          npm install
          mkdir -p game
          cp ../vite/dist/index.html game/index.html
          cat > capacitor.config.json <<'JSON'
{
  "appId": "com.chartworkspace.game",
  "appName": "ChartWorkspace Game",
  "webDir": "game",
  "server": {
    "androidScheme": "app"
  }
}
JSON
          npx cap add android

      - name: Run Capacitor sync
        shell: bash
        run: |
          set -euo pipefail
          cd .offline-build/cap
          npx cap sync android

      - name: Apply Android shrink + size rules
        shell: bash
        run: |
          set -euo pipefail
          APP_GRADLE=.offline-build/cap/android/app/build.gradle
          sed -i 's/minifyEnabled false/minifyEnabled true/g' "$APP_GRADLE"
          grep -q 'shrinkResources true' "$APP_GRADLE" || sed -i '/minifyEnabled true/a\            shrinkResources true' "$APP_GRADLE"
          grep -q 'resConfigs "en", "nodpi"' "$APP_GRADLE" || sed -i '/defaultConfig {/a\        resConfigs "en", "nodpi"' "$APP_GRADLE"
          {
            echo 'android.enableR8.fullMode=true'
            echo 'org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8'
          } >> .offline-build/cap/android/gradle.properties

      - name: Configure optional signing from GitHub Secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd .offline-build/cap/android
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          cat >> gradle.properties <<'EOF'
CHART_SIGNING_STORE_FILE=app/release.keystore
CHART_SIGNING_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
CHART_SIGNING_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
CHART_SIGNING_KEY_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
EOF
          cat >> app/build.gradle <<'EOF'
android {
  signingConfigs {
    release {
      storeFile file(CHART_SIGNING_STORE_FILE)
      storePassword CHART_SIGNING_STORE_PASSWORD
      keyAlias CHART_SIGNING_KEY_ALIAS
      keyPassword CHART_SIGNING_KEY_PASSWORD
    }
  }
  buildTypes {
    release {
      signingConfig signingConfigs.release
    }
  }
}
EOF

      # 3) Build release APK
      - name: Assemble APK (release with debug fallback)
        shell: bash
        run: |
          set -euo pipefail
          cd .offline-build/cap/android
          chmod +x ./gradlew
          if ./gradlew --no-daemon clean assembleRelease; then
            echo "Release build created."
          else
            echo "::warning::assembleRelease failed; creating installable debug APK fallback."
            ./gradlew --no-daemon assembleDebug
          fi

      # 4) Anti-zip standalone APK logic + fallback folder
      - name: Locate and rename APK to Game_Offline_v1.apk
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          UNSIGNED=.offline-build/cap/android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=.offline-build/cap/android/app/build/outputs/apk/release/app-release.apk
          DEBUG=.offline-build/cap/android/app/build/outputs/apk/debug/app-debug.apk
          mkdir -p release-bin
          if [ -f "$SIGNED" ]; then
            cp "$SIGNED" release-bin/Game_Offline_v1.apk
          elif [ -f "$UNSIGNED" ]; then
            cp "$UNSIGNED" release-bin/Game_Offline_v1.apk
          elif [ -f "$DEBUG" ]; then
            cp "$DEBUG" release-bin/Game_Offline_v1.apk
          else
            echo "No release APK file found."
            exit 1
          fi
          echo "apk_path=release-bin/Game_Offline_v1.apk" >> "$GITHUB_OUTPUT"

      - name: Upload raw APK to GitHub Release (primary)
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Upload raw APK to GitHub Release (fallback binary attach)
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bin/Game_Offline_v1.apk
          fail_on_unmatched_files: false
