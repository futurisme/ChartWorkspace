name: Game ZIP Release (for external APK conversion)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: game-zip-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-game-zip:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build static /game output
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npx next export || true
          if [ ! -f out/game/index.html ]; then
            echo "::warning::No out/game/index.html found. Creating fallback package page."
            mkdir -p out/game
            cat > out/game/index.html <<'HTML'
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChartWorkspace /game package</title>
  </head>
  <body>
    <h1>ChartWorkspace /game export unavailable</h1>
    <p>This ZIP is a fallback package generated by CI.</p>
  </body>
</html>
HTML
          fi

      - name: Create release ZIP
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-bin
          cd out
          zip -r ../release-bin/ChartWorkspace_Game_${GITHUB_REF_NAME}.zip game

      - name: Publish ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bin/ChartWorkspace_Game_${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
