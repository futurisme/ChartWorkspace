name: Game APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: game-apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build /game export
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npx next export || true
          if [ ! -f out/game/index.html ]; then
            echo "::warning::No out/game/index.html found. Creating fallback shell."
            mkdir -p out/game
            cat > out/game/index.html <<'HTML'
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChartWorkspace Game APK</title>
  </head>
  <body>
    <h1>ChartWorkspace /game fallback package</h1>
  </body>
</html>
HTML
          fi

      - name: Prepare Capacitor Android project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .apk-build
          mkdir -p .apk-build/cap
          cd .apk-build/cap
          cat > package.json <<'JSON'
{
  "name": "chartworkspace-apk-build",
  "private": true,
  "version": "1.0.0",
  "dependencies": {
    "@capacitor/android": "^7.0.0",
    "@capacitor/cli": "^7.0.0",
    "@capacitor/core": "^7.0.0"
  }
}
JSON
          npm install
          mkdir -p game
          cp ../../out/game/index.html game/index.html
          cat > capacitor.config.json <<'JSON'
{
  "appId": "com.chartworkspace.game",
  "appName": "ChartWorkspace Game",
  "webDir": "game",
  "server": {
    "androidScheme": "app"
  }
}
JSON
          npx cap add android
          npx cap sync android

      - name: Build unsigned release APK using Gradle
        shell: bash
        run: |
          set -euo pipefail
          cd .apk-build/cap/android
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleRelease
          test -f app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload unsigned APK directly to release assets
        uses: softprops/action-gh-release@v2
        with:
          files: .apk-build/cap/android/app/build/outputs/apk/release/app-release-unsigned.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
