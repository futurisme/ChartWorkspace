name: Build Hybrid Online+Offline Game APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-offline-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      NODE_VERSION: '22'
      JAVA_VERSION: '21'
      CI: 'true'
      ONLINE_GAME_URL: ${{ vars.GAME_ONLINE_URL || 'https://yourdomain.com/game' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: npm ci

      # Step 1: Clean and Build /game folder
      - name: Build game route source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .offline-workdir
          mkdir -p .offline-workdir/exported
          npm run build
          npx next export || true
          if [ -f out/game/index.html ]; then
            cp -R out/game/. .offline-workdir/exported/
          else
            echo "::error::Missing out/game/index.html. Configure static export for /game before running APK release."
            exit 1
          fi

      - name: Generate hybrid online/offline launcher
        shell: bash
        run: |
          set -euo pipefail
          cp .offline-workdir/exported/index.html .offline-workdir/exported/game-offline.html
          python - <<'PY'
import base64
from pathlib import Path

exported = Path('.offline-workdir/exported')
offline_html = (exported / 'game-offline.html').read_text(encoding='utf-8')
offline_b64 = base64.b64encode(offline_html.encode('utf-8')).decode('ascii')

launcher = f'''<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChartWorkspace Game</title>
    <style>
      html, body {{ margin: 0; height: 100%; background: #02040a; }}
      iframe {{ border: 0; width: 100%; height: 100%; }}
      .bar {{ position: fixed; top: 0; right: 0; z-index: 5; font: 12px system-ui; color: #fff; background: rgba(0,0,0,.45); padding: 4px 8px; border-radius: 0 0 0 8px; }}
      .hidden {{ display: none; }}
    </style>
  </head>
  <body>
    <div id="mode" class="bar hidden"></div>
    <iframe id="gameFrame" title="ChartWorkspace Game"></iframe>
    <script>
      const ONLINE_URL = {repr('${{ env.ONLINE_GAME_URL }}')};
      const OFFLINE_B64 = '{offline_b64}';
      const frame = document.getElementById('gameFrame');
      const mode = document.getElementById('mode');

      const show = (text) => {{ mode.textContent = text; mode.classList.remove('hidden'); }};
      const loadOffline = () => {{
        const decoded = atob(OFFLINE_B64);
        frame.srcdoc = decoded;
        show('Offline mode');
      }};

      const loadOnline = async () => {{
        try {{
          const response = await fetch(ONLINE_URL, {{ method: 'HEAD', cache: 'no-store', mode: 'no-cors' }});
          // no-cors response status may be opaque, but successful fetch means reachable.
          frame.src = ONLINE_URL;
          show('Online mode');
        }} catch (error) {{
          loadOffline();
        }}
      }};

      if (navigator.onLine) {{
        loadOnline();
      }} else {{
        loadOffline();
      }}
      window.addEventListener('online', loadOnline);
      window.addEventListener('offline', loadOffline);
    </script>
  </body>
</html>'''

(exported / 'index.html').write_text(launcher, encoding='utf-8')
PY

      - name: Create Vite single-file bundle (/game only)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .offline-workdir/vite
          cd .offline-workdir/vite
          cat > package.json <<'JSON'
{
  "name": "chartworkspace-offline-game",
  "private": true,
  "version": "1.0.0",
  "type": "module",
  "scripts": {
    "build": "vite build"
  },
  "devDependencies": {
    "terser": "^5.31.0",
    "vite": "^5.4.19",
    "vite-plugin-singlefile": "^2.0.3"
  }
}
JSON
          cat > vite.config.mjs <<'VITE'
import { defineConfig } from 'vite';
import { viteSingleFile } from 'vite-plugin-singlefile';

export default defineConfig({
  build: {
    outDir: 'dist',
    emptyOutDir: true,
    minify: 'terser',
    cssCodeSplit: false,
    modulePreload: false,
    rollupOptions: {
      input: 'index.html',
      output: {
        inlineDynamicImports: true,
        manualChunks: undefined
      }
    }
  },
  plugins: [viteSingleFile()]
});
VITE
          cp ../exported/index.html ./index.html
          npm install
          npm run build

      - name: Prepare Capacitor 7 Android project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .offline-workdir/cap
          cd .offline-workdir/cap
          cat > package.json <<'JSON'
{
  "name": "chartworkspace-capacitor",
  "private": true,
  "version": "1.0.0",
  "scripts": {
    "cap:sync": "cap sync android"
  },
  "dependencies": {
    "@capacitor/android": "^7.0.0",
    "@capacitor/cli": "^7.0.0",
    "@capacitor/core": "^7.0.0"
  }
}
JSON
          npm install
          mkdir -p web
          cp ../vite/dist/index.html web/index.html
          cat > capacitor.config.ts <<'CAP'
import type { CapacitorConfig } from '@capacitor/cli';

const config: CapacitorConfig = {
  appId: 'com.chartworkspace.game',
  appName: 'ChartWorkspace Game',
  webDir: 'web',
  server: {
    androidScheme: 'app',
    cleartext: false
  }
};

export default config;
CAP
          npx cap add android

      # Step 2: Run npx cap sync
      - name: Capacitor sync
        run: |
          set -euo pipefail
          cd .offline-workdir/cap
          npx cap sync android

      - name: Apply APK shrink rules
        run: |
          set -euo pipefail
          APP_GRADLE=.offline-workdir/cap/android/app/build.gradle
          sed -i 's/minifyEnabled false/minifyEnabled true/g' "$APP_GRADLE"
          grep -q 'shrinkResources true' "$APP_GRADLE" || sed -i '/minifyEnabled true/a\            shrinkResources true' "$APP_GRADLE"
          grep -q 'resConfigs "en", "nodpi"' "$APP_GRADLE" || sed -i '/defaultConfig {/a\        resConfigs "en", "nodpi"' "$APP_GRADLE"
          {
            echo 'android.enableR8.fullMode=true'
            echo 'org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8'
          } >> .offline-workdir/cap/android/gradle.properties

      - name: Configure release signing (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != '' }}
        run: |
          set -euo pipefail
          cd .offline-workdir/cap/android
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          cat >> gradle.properties <<'EOF'
CHART_SIGNING_STORE_FILE=app/release.keystore
CHART_SIGNING_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
CHART_SIGNING_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
CHART_SIGNING_KEY_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
EOF
          cat >> app/build.gradle <<'EOF'
android {
    signingConfigs {
        release {
            storeFile file(CHART_SIGNING_STORE_FILE)
            storePassword CHART_SIGNING_STORE_PASSWORD
            keyAlias CHART_SIGNING_KEY_ALIAS
            keyPassword CHART_SIGNING_KEY_PASSWORD
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
EOF

      # Step 3: Execute ./gradlew assembleRelease
      - name: Build release APK
        run: |
          set -euo pipefail
          cd .offline-workdir/cap/android
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleRelease

      - name: Resolve output APK path
        id: artifact
        run: |
          set -euo pipefail
          UNSIGNED=.offline-workdir/cap/android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=.offline-workdir/cap/android/app/build/outputs/apk/release/app-release.apk
          test -f "$UNSIGNED" || (echo "Missing expected unsigned APK output" && exit 1)
          if [ -f "$SIGNED" ]; then
            echo "apk_path=$SIGNED" >> "$GITHUB_OUTPUT"
            echo "apk_name=chartworkspace-game-${GITHUB_REF_NAME}-signed.apk" >> "$GITHUB_OUTPUT"
          else
            echo "apk_path=$UNSIGNED" >> "$GITHUB_OUTPUT"
            echo "apk_name=chartworkspace-game-${GITHUB_REF_NAME}-unsigned.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage canonical APK artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ steps.artifact.outputs.apk_path }}" "dist/${{ steps.artifact.outputs.apk_name }}"

      # Step 4: Upload raw .apk via GitHub Release
      - name: Publish release APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ steps.artifact.outputs.apk_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
